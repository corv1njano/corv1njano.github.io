    <script>
        function setCurrentArticle() {
            var currentArticle = document.getElementsByClassName('hide-content');
            currentArticle[0].childNodes[0].classList.add('current');
            var currentNavBox = document.getElementsByClassName('nav-box')[0]
            currentNavBox.classList.add('active');
            const content = currentNavBox.lastElementChild;
            if (content.style.maxHeight){
            content.style.maxHeight = null;
            } else {
            content.style.maxHeight = content.scrollHeight + 'px';
            }
        }
    </script>
